<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oakland Open Data Chat</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #242836;
      --border: #2a2e3a;
      --text: #e4e6eb;
      --text-muted: #8b8fa3;
      --accent: #4f8ff7;
      --accent-hover: #3a7be0;
      --user-bg: #1e3a5f;
      --assistant-bg: #1a1d27;
      --tool-bg: #1c2333;
      --tool-border: #2d3548;
      --green: #3fb950;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    header .badge {
      font-size: 11px;
      background: var(--accent);
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 16px 20px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14px;
    }

    .message.user {
      background: var(--user-bg);
      border: 1px solid rgba(79, 143, 247, 0.2);
    }

    .message.assistant {
      background: var(--assistant-bg);
      border: 1px solid var(--border);
    }

    .message .role {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .message.user .role { color: var(--accent); }
    .message.assistant .role { color: var(--green); }

    .message .content { white-space: pre-wrap; word-wrap: break-word; }
    .message .content strong { color: #fff; font-weight: 600; }
    .message .content code {
      background: rgba(255, 255, 255, 0.08);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 13px;
    }

    .tool-calls {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    .tool-call {
      background: var(--tool-bg);
      border: 1px solid var(--tool-border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .tool-call-header {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .tool-call-header .icon { color: var(--accent); }
    .tool-call-header .name {
      font-family: var(--mono);
      font-weight: 600;
      color: var(--accent);
      font-size: 13px;
    }
    .tool-call-header .arrow {
      color: var(--text-muted);
      font-size: 10px;
      margin-left: auto;
      transition: transform 0.2s;
    }
    .tool-call.expanded .arrow { transform: rotate(90deg); }

    .tool-call-detail {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--tool-border);
    }

    .tool-call.expanded .tool-call-detail { display: block; }

    .tool-call-detail pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 10px;
      border-radius: 6px;
      font-size: 11px;
      font-family: var(--mono);
      overflow-x: auto;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .tool-call-detail .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .tool-call-detail .section { margin-bottom: 8px; }

    #welcome {
      max-width: 600px;
      margin: auto;
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    #welcome h2 {
      color: var(--text);
      font-size: 22px;
      margin-bottom: 12px;
    }

    #welcome p { margin-bottom: 20px; line-height: 1.6; font-size: 14px; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .suggestion {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .suggestion:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
    }

    #input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #input-wrapper {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
    }

    #message-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      resize: none;
      min-height: 44px;
      max-height: 120px;
    }

    #message-input:focus { border-color: var(--accent); }
    #message-input::placeholder { color: var(--text-muted); }

    #send-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 13px;
      max-width: 800px;
      margin: 0 auto;
      padding: 12px 20px;
    }

    .loading .dots span {
      animation: blink 1.4s infinite;
      font-size: 18px;
    }
    .loading .dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Oakland Open Data</h1>
    <span class="badge">AI Chat</span>
  </header>

  <div id="chat-container">
    <div id="welcome">
      <h2>Explore Oakland's Public Data</h2>
      <p>Ask questions about Oakland's open government data — crime statistics, 311 service requests, budget, street trees, and more.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="askQuestion(this.textContent)">What types of crime data does Oakland publish?</button>
        <button class="suggestion" onclick="askQuestion(this.textContent)">Show me the most common 311 complaints</button>
        <button class="suggestion" onclick="askQuestion(this.textContent)">What categories of data are available?</button>
        <button class="suggestion" onclick="askQuestion(this.textContent)">How many street trees does Oakland track?</button>
      </div>
    </div>
  </div>

  <div id="input-area">
    <div id="input-wrapper">
      <textarea
        id="message-input"
        placeholder="Ask about Oakland's open data..."
        rows="1"
        onkeydown="handleKeyDown(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    let conversationHistory = [];
    let isLoading = false;

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function askQuestion(text) {
      document.getElementById('message-input').value = text;
      sendMessage();
    }

    function formatContent(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>');
    }

    function addMessage(role, content) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const container = document.getElementById('chat-container');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = `
        <div class="role">${role}</div>
        <div class="content">${formatContent(content)}</div>
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function addToolCalls(toolCalls) {
      if (!toolCalls || toolCalls.length === 0) return;

      const container = document.getElementById('chat-container');
      const wrapper = document.createElement('div');
      wrapper.className = 'tool-calls';

      for (const tc of toolCalls) {
        const div = document.createElement('div');
        div.className = 'tool-call';
        div.innerHTML = `
          <div class="tool-call-header" onclick="this.parentElement.classList.toggle('expanded')">
            <span class="icon">&#9881;</span>
            <span class="name">${tc.tool}</span>
            <span class="arrow">&#9654;</span>
          </div>
          <div class="tool-call-detail">
            <div class="section">
              <div class="label">Input</div>
              <pre>${JSON.stringify(tc.input, null, 2)}</pre>
            </div>
            <div class="section">
              <div class="label">Result</div>
              <pre>${escapeHtml(tc.result)}</pre>
            </div>
          </div>
        `;
        wrapper.appendChild(div);
      }

      container.appendChild(wrapper);
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function showLoading() {
      const container = document.getElementById('chat-container');
      const div = document.createElement('div');
      div.className = 'loading';
      div.id = 'loading-indicator';
      div.innerHTML = `Querying Oakland data <span class="dots"><span>.</span><span>.</span><span>.</span></span>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function hideLoading() {
      const el = document.getElementById('loading-indicator');
      if (el) el.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('message-input');
      const text = input.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      document.getElementById('send-btn').disabled = true;
      input.value = '';
      input.style.height = 'auto';

      addMessage('user', text);
      showLoading();

      try {
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            history: conversationHistory,
          }),
        });

        const data = await resp.json();
        hideLoading();

        if (data.error) {
          addMessage('assistant', `Error: ${data.error}`);
        } else {
          addToolCalls(data.tool_calls);
          addMessage('assistant', data.response);

          // Update conversation history for multi-turn
          conversationHistory.push({ role: 'user', content: text });
          conversationHistory.push({ role: 'assistant', content: data.response });
        }
      } catch (err) {
        hideLoading();
        addMessage('assistant', `Connection error: ${err.message}`);
      }

      isLoading = false;
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
